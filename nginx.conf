server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # --- Compression (Cloudflare also compresses at the edge, but compress at
    #     origin too so direct hits and the tunnel both benefit). ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/rss+xml image/svg+xml font/ttf font/otf;

    # Hashed, immutable build assets — cache hard.
    location /_app/immutable/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Client-rendered SPA areas (authed app, mobile shell, super-admin, public
    # token deep-links) — all noindex. Serve the SPA shell for any path here so
    # client routing + the in-app 404 take over.
    location /app          { try_files $uri /200.html; }
    location /mobile       { try_files $uri /200.html; }
    location /super-admin  { try_files $uri /200.html; }
    location /m/           { try_files $uri /200.html; }
    location /reg/         { try_files $uri /200.html; }
    location /paket/       { try_files $uri /200.html; }
    location /kontrak/     { try_files $uri /200.html; }

    # Public / prerendered surface: exact file, prerendered *.html, or directory
    # index. Genuinely unknown URLs return a REAL HTTP 404 (no soft-404 for
    # crawlers) instead of the SPA shell.
    #   $uri       -> exact file (assets, "/" -> index.html)
    #   $uri.html  -> prerendered pages (/tentang -> tentang.html)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    error_page 404 /404.html;

    # Branded 404 served only via the error handler (keeps its 404 status),
    # never as a directly-fetchable 200 page. HTML/SPA shell always revalidated.
    location = /404.html { internal; add_header Cache-Control "no-cache"; }
    location = /200.html { add_header Cache-Control "no-cache"; }
    location = /index.html { add_header Cache-Control "no-cache"; }

    location /api/ {
        rewrite ^/api/(.*) /api/v1/$1 break;
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /public/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /progress/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    location /payment/webhook {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
