<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Halaman tidak ditemukan - Suluk</title>
    <link rel="icon" type="image/png" href="/brand/suluk-icon.png" />
    <style>
      :root { --green: #0f3d2e; --gold: #c79a3e; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f5f7f6;
        color: #14201b;
      }
      .box { text-align: center; max-width: 460px; }
      .mark { height: 56px; width: auto; margin-bottom: 20px; }
      .code { font-size: 72px; font-weight: 800; line-height: 1; color: var(--green); }
      h1 { font-size: 22px; margin: 8px 0 6px; }
      p { color: #4a5a52; margin: 0 0 24px; line-height: 1.6; }
      .btn {
        display: inline-block;
        background: var(--green);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        padding: 12px 22px;
        border-radius: 10px;
      }
      .btn:hover { background: #0c5f46; }
      .links { margin-top: 18px; font-size: 14px; }
      .links a { color: var(--gold); text-decoration: none; font-weight: 600; margin: 0 8px; }
      .links a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="box">
      <img class="mark" src="/brand/suluk-mark.png" alt="Suluk" />
      <div class="code">404</div>
      <h1>Halaman tidak ditemukan</h1>
      <p>Maaf, halaman yang Anda cari tidak tersedia atau telah dipindahkan.</p>
      <a class="btn" href="/">Kembali ke Beranda</a>
      <div class="links">
        <a href="/software-travel-umrah">Software</a>
        <a href="/panduan">Panduan</a>
        <a href="/unduh">Aplikasi</a>
        <a href="/kontak">Kontak</a>
      </div>
    </div>
  </body>
</html>
