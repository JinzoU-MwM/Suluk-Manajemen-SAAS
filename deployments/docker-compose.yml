services:
  postgres:
    image: postgres:16-alpine
    container_name: suluk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - suluk_pgdata:/var/lib/postgresql/data
      - ../scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jamaah"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - suluk-network

  redis:
    image: redis:7-alpine
    container_name: suluk-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - suluk_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - suluk-network

  nats:
    image: nats:2-alpine
    container_name: suluk-nats
    restart: unless-stopped
    ports:
      - "127.0.0.1:4223:4222"
      - "127.0.0.1:8223:8222"
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - suluk_natsdata:/data
    networks:
      - suluk-network

  minio:
    image: minio/minio
    container_name: suluk-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in deployments/.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in deployments/.env}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - suluk_miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - suluk-network

  api-gateway:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: api-gateway
    container_name: suluk-api-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      GATEWAY_PORT: "8080"
      AUTH_SERVICE_ADDR: auth-service:50051
      PACKAGE_SERVICE_ADDR: package-service:50052
      JAMAAH_SERVICE_ADDR: jamaah-service:50053
      INVOICE_SERVICE_ADDR: invoice-service:50054
      FINANCE_SERVICE_ADDR: finance-service:50055
      AIOCR_SERVICE_ADDR: ai-ocr-service:50056
      VENDOR_SERVICE_ADDR: vendor-service:50057
      CONTRACT_SERVICE_ADDR: contract-service:50058
      INVENTORY_SERVICE_ADDR: inventory-service:50059
      PAYROLL_SERVICE_ADDR: payroll-service:50060
      AGENT_SERVICE_ADDR: agent-service:50061
      ACCOUNTING_SERVICE_ADDR: accounting-service:50062
      TABUNGAN_SERVICE_ADDR: tabungan-service:50063
      MUTAWWIF_SERVICE_ADDR: mutawwif-service:50064
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8005,http://localhost:8007,https://test.jni.my.id"
      APP_ENV: production
    depends_on:
      - auth-service
      - package-service
      - jamaah-service
      - invoice-service
      - finance-service
      - ai-ocr-service
      - vendor-service
      - contract-service
      - accounting-service
      - tabungan-service
      - mutawwif-service
    networks:
      - suluk-network

  auth-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: auth-service
    container_name: suluk-auth-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      AUTH_SERVICE_PORT: "50051"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      REDIS_ADDR: redis:6379
      JAMAAH_SERVICE_ADDR: jamaah-service:50053
      INVOICE_SERVICE_ADDR: invoice-service:50054
      # Shared secret to authenticate the internal plan-activation endpoint
      # called by the payment webhook (must match invoice-service).
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      # Transactional email (subscription invoice/confirmation, OTP, etc.).
      # SMTP preferred (mailspace.id); Resend is an optional fallback.
      EMAIL_FROM: ${EMAIL_FROM:-Suluk <admin@suluk.site>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 60m
      JWT_REFRESH_TTL: 720h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  package-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: package-service
    container_name: suluk-package-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      PACKAGE_SERVICE_PORT: "50052"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  jamaah-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: jamaah-service
    container_name: suluk-jamaah-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      JAMAAH_SERVICE_PORT: "50053"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      INVOICE_SERVICE_ADDR: invoice-service:50054
      AUTH_SERVICE_ADDR: auth-service:50051
      PACKAGE_SERVICE_ADDR: package-service:50052
      AGENT_SERVICE_ADDR: agent-service:50061
      NATS_ADDR: nats://nats:4222
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set in deployments/.env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set in deployments/.env}
      MINIO_BUCKET: jamaah-docs
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - suluk-network

  invoice-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: invoice-service
    container_name: suluk-invoice-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      INVOICE_SERVICE_PORT: "50054"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      NATS_ADDR: nats://nats:4222
      AUTH_SERVICE_ADDR: auth-service:50051
      # Public base URL of the app (used to build the Pakasir redirect-back link).
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      # Shared internal secret (must match auth-service).
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      # Pakasir payment gateway.
      PAKASIR_API_KEY: ${PAKASIR_API_KEY:-}
      PAKASIR_PROJECT_SLUG: ${PAKASIR_PROJECT_SLUG:-}
      PAKASIR_BASE_URL: ${PAKASIR_BASE_URL:-https://app.pakasir.com}
      PAKASIR_SANDBOX: ${PAKASIR_SANDBOX:-false}
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - suluk-network

  finance-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: finance-service
    container_name: suluk-finance-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      FINANCE_SERVICE_PORT: "50055"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      INVOICE_SERVICE_ADDR: invoice-service:50054
      VENDOR_SERVICE_ADDR: vendor-service:50057
      PACKAGE_SERVICE_ADDR: package-service:50052
      JAMAAH_SERVICE_ADDR: jamaah-service:50053
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  ai-ocr-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: ai-ocr-service
    container_name: suluk-ai-ocr-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      AIOCR_SERVICE_PORT: "50056"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set in deployments/.env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set in deployments/.env}
      MINIO_BUCKET: jamaah-docs
      GEMINI_API_KEY: ""
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - suluk-network

  vendor-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: vendor-service
    container_name: suluk-vendor-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      VENDOR_SERVICE_PORT: "50057"
      NATS_ADDR: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  contract-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: contract-service
    container_name: suluk-contract-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      CONTRACT_SERVICE_PORT: "50058"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  inventory-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: inventory-service
    container_name: suluk-inventory-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      INVENTORY_SERVICE_PORT: "50059"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  payroll-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: payroll-service
    container_name: suluk-payroll-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      PAYROLL_SERVICE_PORT: "50060"
      NATS_ADDR: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  agent-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: agent-service
    container_name: suluk-agent-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      AGENT_SERVICE_PORT: "50061"
      NATS_ADDR: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  mutawwif-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: mutawwif-service
    container_name: suluk-mutawwif-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      MUTAWWIF_SERVICE_PORT: "50064"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suluk-network

  accounting-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: accounting-service
    container_name: suluk-accounting-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      ACCOUNTING_SERVICE_PORT: "50062"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      NATS_ADDR: nats://nats:4222
      GEMINI_API_KEY: ${GEMINI_API_KEY:-} # optional — copilot adds AI narrative when set

      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - suluk-network

  tabungan-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        SERVICE: tabungan-service
    container_name: suluk-tabungan-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      TABUNGAN_SERVICE_PORT: "50063"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: jamaah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_SSLMODE: require
      NATS_ADDR: nats://nats:4222
      INVOICE_SERVICE_ADDR: invoice-service:50054
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      JWT_PRIVATE_KEY_PATH: /app/certs/private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    volumes:
      - ../certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - suluk-network

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: suluk-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8007:80"
    depends_on:
      - api-gateway
    networks:
      - suluk-network

volumes:
  suluk_pgdata:
  suluk_redisdata:
  suluk_natsdata:
  suluk_miniodata:

networks:
  suluk-network:
    driver: bridge
