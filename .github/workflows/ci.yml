name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies (OCR/OpenCV)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 tesseract-ocr

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend smoke tests
        env:
          JWT_SECRET_KEY: ci-test-secret
        run: |
          python -m pytest -q \
            backend/tests/test_shared_router.py \
            backend/tests/test_ocr_status_router.py \
            backend/tests/test_ocr_review_router.py \
            backend/tests/integration/test_group_duplicates.py \
            backend/tests/integration/test_audit_log.py \
            backend/tests/integration/test_super_admin_ai_cache_router.py \
            backend/tests/integration/test_payment_webhook_security.py \
            backend/tests/integration/test_registration_security.py \
            backend/tests/integration/test_shared_manifest_security.py \
            backend/tests/integration/test_export_template_security.py \
            backend/tests/integration/test_auth_cookie_session.py \
            backend/tests/integration/test_ops_endpoint_security.py \
            backend/tests/integration/test_super_admin_charts_router.py

  frontend-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-svelte/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-svelte
        run: npm ci

      - name: Frontend quality checks
        working-directory: frontend-svelte
        run: |
          npm run check
          npm run test
          npm run build
