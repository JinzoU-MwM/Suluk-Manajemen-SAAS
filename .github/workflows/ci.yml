name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: gosec security scan
        uses: securego/gosec@master
        with:
          args: ./...

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Svelte app
        run: npm run check

      - name: Run frontend tests
        run: npm test
