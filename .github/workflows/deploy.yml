name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies (OCR/OpenCV)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 tesseract-ocr

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend smoke test
        env:
          JWT_SECRET_KEY: ci-test-secret
        run: |
          python -m pytest -q backend/tests/test_shared_router.py backend/tests/test_ocr_status_router.py backend/tests/test_ocr_review_router.py backend/tests/integration/test_group_duplicates.py backend/tests/integration/test_audit_log.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-svelte/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-svelte
        run: npm ci

      - name: Frontend quality checks
        working-directory: frontend-svelte
        run: |
          npm run check
          npm run test
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /var/www/jamaah.in

            # Pull latest code
            git checkout main
            git pull --ff-only origin main

            # Backend: update dependencies + migrate
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            set -a
            [ -f ../.env ] && . ../.env
            [ -f .env ] && . .env
            set +a
            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL is not set. Ensure .env exists in /var/www/jamaah.in or /var/www/jamaah.in/backend."
              exit 1
            fi
            set +e
            MIGRATION_OUTPUT="$(python -m alembic upgrade head 2>&1)"
            MIGRATION_STATUS=$?
            set -e
            if [ $MIGRATION_STATUS -ne 0 ]; then
              echo "$MIGRATION_OUTPUT"
              if echo "$MIGRATION_OUTPUT" | grep -q "Can't locate revision identified by"; then
                echo "Detected unknown alembic revision in DB. Purging version table, stamping to merge_heads_20260304, and retrying..."
                python -m alembic stamp --purge merge_heads_20260304
                python -m alembic upgrade head
              else
                exit $MIGRATION_STATUS
              fi
            fi
            deactivate
            cd ..

            # Frontend: install and build
            cd frontend-svelte
            npm ci --quiet
            npm run build
            cd ..

            # Restart backend service
            sudo systemctl restart jamaah-backend

            # Health check with retries (fail deploy if unhealthy)
            HEALTH_OK=0
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
                HEALTH_OK=1
                break
              fi
              sleep 3
            done
            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "Health check failed. Service diagnostics:"
              sudo systemctl status jamaah-backend --no-pager -l || true
              sudo journalctl -u jamaah-backend -n 150 --no-pager || true
              exit 1
            fi

            echo "Deployment complete"
